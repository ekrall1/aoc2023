trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - '*'

jobs:
  - job: BuildAndTest
    displayName: "Build and test"
    pool:
      name: Default
    variables:
      BASH_ENV: /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
      NIX_CONFIG: extra-experimental-features = nix-command flakes
    steps:
      - checkout: self
      - script: |
          #!/bin/bash
          
          my_test="${PIPELINE_TEST:-${PIPELINE_TEST:-}}"
          test1=()
          if [ -n "my_test" ]; then
            test1+=(--test-arg "$my_test")
          fi

          echo "${test1[@]}"

          echo "${TESTVAR:-${TESTVAR:-}}"
          #NIX_PATH=nixpkgs=channel:nixos-24.05 nix build --option sandbox false
        displayName:
          "Nix build and test"
